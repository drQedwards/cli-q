name: Bug Report
description: Something isn't working
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug!

  - type: input
    id: version
    attributes:
      label: Supermodel version
      placeholder: supermodel version
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / architecture
      placeholder: "e.g. macOS 15 arm64"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include the exact command you ran and the full output.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
